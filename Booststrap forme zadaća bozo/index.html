<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Kontakt forma</title>
</head>

<body class="bg-light">

<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow">
        <div class="card-body p-4">

          <h3 class="text-center mb-4">Kontaktirajte nas</h3>

          <form>

            <div class="mb-3">
              <label for="ime" class="form-label">Ime</label>
              <input type="text" class="form-control" id="ime" placeholder="Unesite ime">
            </div>

            <div class="mb-3">
              <label for="prezime" class="form-label">Prezime</label>
              <input type="text" class="form-control" id="prezime" placeholder="Unesite prezime">
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email adresa</label>
              <input type="email" class="form-control" id="email" placeholder="name@example.com">
            </div>

            <div class="mb-3">
              <label for="telefon" class="form-label">Telefon</label>
              <input type="tel" class="form-control" id="telefon" placeholder="+387...">
            </div>

            <div class="mb-3">
              <label for="grad" class="form-label">Grad</label>
              <input type="text" class="form-control" id="grad" placeholder="Unesite grad">
            </div>

            <div class="mb-3">
              <label for="poruka" class="form-label">Poruka</label>
              <textarea class="form-control" id="poruka" rows="3"></textarea>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Pošalji poruku</button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
<!-- https://web3forms.com/templates/basic-html-contact-form  odavde je uzet html-->
