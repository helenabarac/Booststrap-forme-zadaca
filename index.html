<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Uplata / Članstvo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

<div class="row justify-content-center">
<div class="col-md-8">

<div class="card shadow">
<div class="card-body p-4">

<h3 class="text-center mb-4">Prijava za članstvo</h3>

<form>

<div class="mb-3">
<label class="form-label">Ime i prezime</label>
<input type="text" class="form-control" placeholder="Unesite ime i prezime">
</div>

<div class="mb-3">
<label class="form-label">Ime jednog roditelja</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Godina rođenja</label>
<input type="number" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Trenutna adresa i mjesto stanovanja</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Kontakt telefon</label>
<input type="tel" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">E-mail adresa</label>
<input type="email" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Zanimanje</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label class="form-label d-block">Želite li primati obavijesti putem e-maila?</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="email">
<label class="form-check-label">Da</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="email">
<label class="form-check-label">Ne</label>
</div>

</div>

<div class="mb-3 form-check">
<input type="checkbox" class="form-check-input">
<label class="form-check-label">
Saglasna sam da se moji lični podaci koriste za potrebe udruženja.
</label>
</div>

<div class="d-grid">
<button class="btn btn-primary">Pošalji</button>
</div>

</form>

</div>
</div>

</div>
</div>

</div>

</body>
</html>
